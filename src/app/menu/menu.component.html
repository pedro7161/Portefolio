@if (content(); as page) {
  <header class="site-header">
    <div class="header-inner">
      <a class="brand-link" routerLink="/" (click)="closeMenu()">
        <span class="brand-mark">PP</span>
        <span class="brand-copy">
          <strong>Pedro Pinto</strong>
          <span>{{ page.copy.hero.eyebrow }}</span>
        </span>
      </a>

      <button
        class="menu-toggle"
        type="button"
        aria-label="Toggle navigation"
        [attr.aria-expanded]="menuOpen"
        (click)="toggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="header-controls" [class.is-open]="menuOpen">
        <nav class="site-nav" aria-label="Primary">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()"
          >
            {{ page.copy.nav.profile }}
          </a>
          <a
            class="nav-link"
            routerLink="/projects"
            routerLinkActive="is-active"
            (click)="closeMenu()"
          >
            {{ page.copy.nav.projects }}
          </a>
        </nav>

        <div class="flex flex-col gap-4 md:flex-row md:gap-8 md:items-center">
          <div class="control-switcher" [attr.aria-label]="page.copy.nav.language">
            <span class="control-label text-sm font-medium">{{ page.copy.nav.language }}</span>
            <div class="control-buttons">
              <button
                class="control-button"
                type="button"
                [class.is-active]="currentLanguage() === 'en'"
                (click)="setLanguage('en')"
              >
                EN
              </button>
              <button
                class="control-button"
                type="button"
                [class.is-active]="currentLanguage() === 'pt-PT'"
                (click)="setLanguage('pt-PT')"
              >
                PT-PT
              </button>
            </div>
          </div>

          <div class="control-switcher" [attr.aria-label]="page.copy.nav.theme">
            <span class="control-label text-sm font-medium">{{ page.copy.nav.theme }}</span>
            <div class="control-buttons">
              <button
                class="control-button"
                type="button"
                [class.is-active]="currentTheme() === 'dark'"
                (click)="setTheme('dark')"
              >
                {{ page.copy.nav.dark }}
              </button>
              <button
                class="control-button"
                type="button"
                [class.is-active]="currentTheme() === 'light'"
                (click)="setTheme('light')"
              >
                {{ page.copy.nav.light }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
}
